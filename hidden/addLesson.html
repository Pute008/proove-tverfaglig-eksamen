<!-- klassetimer -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="addLesson.js" defer></script>
</head>
<body>
    <header><h1>Add Lessons</h1></header>
    <menu>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="info.html">Info</a></li>
            <li><a href="lessons.html">Lessons</a></li>
            <li><a href="remarks.html">Remarks</a></li>
            <li><a href="options.html">Options</a></li>
        </ul>
    </menu>
    <main >
        <div>
            <h2><a href="/lessons.html">View lessons</a></h2>
        </div>

        <form id="newLessonForm">
            <label for="teacher">Teacher:</label>
            <select id="teacher" name="teacher" required>
                <option value="" disabled selected>Select teacher</option>
            </select><br>

            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="" disabled selected>Select subject</option>
            </select><br>

            <label for="rooms">Room:</label>
            <select id="rooms" name="rooms" required>
                <option value="" disabled selected>Select room</option>
            </select><br>

            <label for="classes">Class:</label>
            <select id="classes" name="classes" required>
                <option value="" disabled selected>Select class</option>
            </select><br>

            <label for="start_time">Start time:</label>
            <input type="datetime-local" id="start_time" name="start_time" required><br>

            <label for="end_time">End time:</label>
            <input type="datetime-local" id="end_time" name="end_time" required><br>

            <button type="submit">Create Lesson</button>
        </form>
    </main>
    <footer>
        <button onclick="logout()">Logout</button>
    </footer>
</body>
</html>
