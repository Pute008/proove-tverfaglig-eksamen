    <main >
        <div id="adminOptions">
            <!-- Admin-only content will be added here by JavaScript -->
        </div>

        <div id="usersAdminOptions">

        <div id="ITOptions">

        </div>

        <button onclick="logout()">Logout</button>
    </footer>

<script>
    // Show Add Person link only for admins
    async function loadAdminOptions() {
        try {
            const response = await fetch("/userInfo");
            if (response.ok) {
                const user = await response.json();
                if (user.role_name === "Admin" || user.role_id === 3) {
                    document.getElementById("adminOptions").innerHTML = '<p><a href="/addPerson">Add Person</a></p>';
                    document.getElementById("usersAdminOptions").innerHTML = '<p><a href="/adminUsersInfo">See All Users Computers</a></p>';
                    document.getElementById("ITOptions").innerHTML = '<p><a href="/userComputerInfo">See All Users - Only Admin</a></p>';
                } else if (user.role_name === "IT-arbeider" || user.role_id === 5) {
                    document.getElementById("ITOptions").innerHTML = '<p><a href="/userComputerInfo">See All Users Computers</a></p>';
                }
            }
        } catch (error) {
            console.error("Error loading admin options:", error);
        }
    }
    loadAdminOptions();
</script>
