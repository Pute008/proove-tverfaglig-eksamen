<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="home.js" defer></script>
</head>
<body>
    <header><h1>Options</h1></header>
    <menu>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="info.html">Info</a></li>
            <li><a href="lessons.html">Lessons</a></li>
            <li><a href="remarks.html">Remarks</a></li>
            <li><a href="options.html">Options</a></li>
        </ul>
    </menu>
    <main >
        <div id="adminOptions">
            <!-- Admin-only content will be added here by JavaScript -->
        </div>
    </main>
    <script>
        // Show Add Person link only for admins
        async function loadAdminOptions() {
            try {
                const response = await fetch("/userInfo");
                if (response.ok) {
                    const user = await response.json();
                    if (user.role_name === "Admin" || user.role_id === 3) {
                        document.getElementById("adminOptions").innerHTML = '<p><a href="/addPerson">Add Person</a></p>';
                    }
                }
            } catch (error) {
                console.error("Error loading admin options:", error);
            }
        }
        loadAdminOptions();
    </script>
    <footer>
        <button onclick="logout()">Logout</button>
    </footer>
</body>
</html>
