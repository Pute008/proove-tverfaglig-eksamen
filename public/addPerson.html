<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="home.js" defer></script>
</head>
<body>
    <header><h1>Add Person</h1></header>
    <menu>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="info.html">Info</a></li>
            <li><a href="lessons.html">Lessons</a></li>
            <li><a href="remarks.html">Remarks</a></li>
            <li><a href="options.html">Options</a></li>
        </ul>
    </menu>
    <main >
        <form id="newUserForm">
            <label for="firstname">Firstname:</label>
            <input type="text" id="firstname" name="firstname" required><br>

            <label for="lastname">Lastname:</label>
            <input type="text" id="lastname" name="lastname" required><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="6"><br>

            <label for="Role">Role:</label>
            <select name="role" id="role" required>
                <option value="" disabled selected>Select activity</option>
                <option value="Elev">Elev</option>
                <option value="Lærer">Lærer</option>
                <option value="Admin">Admin</option>
            </select><br>

            <label for="class">Class:</label>
            <input type="text" id="classes" name="class" required><br>

            <p id="demo"></p>

            <button type="submit">Create User</button>
        </form>
    </main>
    <footer>
        <button onclick="logout()">Logout</button>
    </footer>
</body>
</html>
